{% load static %}
<!DOCTYPE html>
<html class="Light" Lang="en">


<head>
    <meta charset="UTF-8">
    <meta  content="width=device-width, initial-scale=1.0"name="viewpoint"/>
    <title>Smart Attendance & Fee Management Login</title>
    

    <!-- Tailwind CSS -->
    <link rel="stylesheet" href="{% static 'css/output.css' %}">
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <h1 class="text-3xl text-blue-600 font-bold">
  Tailwind is finally working 🎉
</h1>

    <div class="w-full max-w-sm p-6 bg-white rounded-lg shadow-md">
        <h2 class="text-2xl font-bold text-center text-blue-600 mb-6">Teacher Login</h2>

        <form method="post" class="space-y-4">
            {% csrf_token %}
            
            <div>
                <label class="block text-gray-700 mb-1">Username</label>
                <input type="text" name="username" required class="w-full p-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label class="block text-gray-700 mb-1">Password</label>
                <input type="password" name="password" required class="w-full p-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700 transition-colors">
                Login
            </button>
        </form>
    </div>

</body>
</html>
