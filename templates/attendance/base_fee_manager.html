{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Fee Manager - SAFMS{% endblock %}</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

    <style>
        body {
            font-family: 'Lexend', sans-serif;
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-800">

<div class="min-h-screen flex">

    <!-- Sidebar -->
    <aside class="w-72 bg-slate-900 text-white flex flex-col">
        <div class="px-6 py-6 border-b border-slate-800">
            <h1 class="text-2xl font-bold text-blue-400">SAFMS</h1>
            <p class="text-sm text-slate-400 mt-1">Fee Manager Panel</p>
        </div>

        <nav class="flex-1 p-4 space-y-2">
            <a href="{% url 'attendance:fee_manager_dashboard' %}" class="block px-4 py-3 rounded-xl hover:bg-slate-800">
                Dashboard
            </a>

            <a href="{% url 'attendance:fee_manager_requests' %}" class="block px-4 py-3 rounded-xl hover:bg-slate-800">
                Payment Requests
            </a>

            <a href="/fee-admin/attendance/feestructure/" class="block px-4 py-3 rounded-xl hover:bg-slate-800">
                Fee Structures
            </a>

            <a href="/fee-admin/attendance/payment/" class="block px-4 py-3 rounded-xl hover:bg-slate-800">
                Payments
            </a>

            <a href="/fee-admin/attendance/notification/" class="block px-4 py-3 rounded-xl hover:bg-slate-800">
                Notifications
            </a>
        </nav>

        <div class="p-4 border-t border-slate-800">
            <a href="{% url 'logout' %}" class="block w-full text-center bg-red-500 hover:bg-red-600 px-4 py-3 rounded-xl font-medium">
                Logout
            </a>
        </div>
    </aside>

    <!-- Main -->
    <main class="flex-1 p-8">
        {% block content %}{% endblock %}
    </main>
</div>

</body>
</html>
