{% extends "attendance/admin/base_admin.html" %}
{% block title %}Confirm Delete{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
  <div class="bg-white rounded-xl border border-red-200 p-6">
    <div class="flex items-center gap-3 mb-4">
      <div class="size-10 rounded-lg bg-red-100 text-red-600 flex items-center justify-center">
        <span class="material-symbols-outlined">warning</span>
      </div>
      <h1 class="text-xl font-black text-red-700">Confirm Delete</h1>
    </div>
    <p class="text-slate-700 mb-2">Are you sure you want to delete this?</p>
    <p class="text-sm font-bold text-slate-900 bg-slate-100 px-3 py-2 rounded mb-5">{{ object_name }}</p>
    <p class="text-xs text-red-600 mb-5">This action cannot be undone.</p>

    <form method="post" class="flex items-center gap-3">
      {% csrf_token %}
      <button type="submit" class="px-5 py-2.5 bg-red-600 hover:bg-red-700 text-white rounded-lg font-semibold text-sm">
        Yes, Delete
      </button>
      <a href="{{ back_url }}" class="px-5 py-2.5 bg-slate-200 text-slate-700 rounded-lg font-semibold text-sm">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
