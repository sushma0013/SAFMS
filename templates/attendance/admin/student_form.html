{% extends "attendance/admin/base_admin.html" %}
{% block title %}Edit Student{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
  <h1 class="text-3xl font-black text-slate-900 mb-6">Edit Student: {{ profile.full_name }}</h1>

  <form method="post" class="bg-white rounded-xl border border-slate-200 p-6 space-y-5">
    {% csrf_token %}

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">Student ID *</label>
        <input type="text" name="student_id" required value="{{ profile.student_id }}" class="w-full px-4 py-2.5 rounded-lg border border-slate-300">
      </div>
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">Full Name *</label>
        <input type="text" name="full_name" required value="{{ profile.full_name }}" class="w-full px-4 py-2.5 rounded-lg border border-slate-300">
      </div>
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">Phone</label>
        <input type="text" name="phone" value="{{ profile.phone }}" class="w-full px-4 py-2.5 rounded-lg border border-slate-300">
      </div>
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">Major</label>
        <input type="text" name="major" value="{{ profile.major }}" class="w-full px-4 py-2.5 rounded-lg border border-slate-300">
      </div>
    </div>

    <div>
      <label class="block text-sm font-semibold text-slate-700 mb-1">Address</label>
      <input type="text" name="address" value="{{ profile.address }}" class="w-full px-4 py-2.5 rounded-lg border border-slate-300">
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">Semester</label>
        <input type="text" name="semester" value="{{ profile.semester }}" placeholder="e.g. 1, 2, 3..." class="w-full px-4 py-2.5 rounded-lg border border-slate-300">
        <p class="text-xs text-slate-500 mt-1">Use plain numbers like "1" or "2".</p>
      </div>
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">Academic Advisor</label>
        <select name="academic_advisor" class="w-full px-4 py-2.5 rounded-lg border border-slate-300">
          <option value="">— None —</option>
          {% for t in teachers %}
            <option value="{{ t.id }}" {% if profile.academic_advisor_id == t.id %}selected{% endif %}>{{ t.username }}</option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div class="flex items-center gap-3 pt-4 border-t">
      <button type="submit" class="px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-semibold text-sm">Save</button>
      <a href="{% url 'attendance:admin_students' %}" class="px-5 py-2.5 bg-slate-200 text-slate-700 rounded-lg font-semibold text-sm">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
