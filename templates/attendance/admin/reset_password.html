{% extends "attendance/admin/base_admin.html" %}
{% block title %}Reset Password{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
  <div class="bg-white rounded-xl border border-slate-200 p-6">
    <div class="flex items-center gap-3 mb-5">
      <div class="size-10 rounded-lg bg-amber-100 text-amber-600 flex items-center justify-center">
        <span class="material-symbols-outlined">key</span>
      </div>
      <div>
        <h1 class="text-xl font-black text-slate-900">Reset Password</h1>
        <p class="text-sm text-slate-500">For user: <b>{{ user_obj.username }}</b></p>
      </div>
    </div>

    <form method="post" class="space-y-4">
      {% csrf_token %}
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">New Password *</label>
        <input type="text" name="password" required class="w-full px-4 py-2.5 rounded-lg border border-slate-300">
        <p class="text-xs text-slate-500 mt-1">Min 4 characters. Share with user securely.</p>
      </div>
      <div class="flex items-center gap-3 pt-3">
        <button type="submit" class="px-5 py-2.5 bg-amber-600 hover:bg-amber-700 text-white rounded-lg font-semibold text-sm">
          Set New Password
        </button>
        <a href="{% url 'attendance:admin_users' %}" class="px-5 py-2.5 bg-slate-200 text-slate-700 rounded-lg font-semibold text-sm">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
