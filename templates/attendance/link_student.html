<!DOCTYPE html>
<html>
<head>
    <title>Link Student</title>
</head>
<body>

<h2>Link your Student ID</h2>

<form method="post">
    {% csrf_token %}
    <input
        type="text"
        name="student_id"
        placeholder="Enter your Student ID"
        required
    >
    <button type="submit">Continue</button>
</form>

{% if error %}
<p style="color:red">{{ error }}</p>
{% endif %}

</body>
</html>
