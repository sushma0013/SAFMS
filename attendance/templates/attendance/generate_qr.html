<!DOCTYPE html>
<html>
<head>
  <title>Generate QR Code</title>
</head>
<body>
  <h2>QR for {{ subject.name }}</h2>
  <p>Teacher: {{ teacher.get_full_name }}</p>

  {% if qr_url %}
      <h3>Scan this QR to mark attendance:</h3>
      <img src="{{ qr_url }}" alt="QR Code">
      <p>Valid until: {{ valid_until }}</p>
  {% else %}
      <p>No QR available today.</p>
  {% endif %}
</body>
</html>
